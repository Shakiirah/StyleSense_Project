spring.application.name=StyleSense_Backend
server.port=8080

# Active database profile.
# Default is PostgreSQL to match the project proposal deployment database.
# To use SQLite locally, run with: --spring.profiles.active=sqlite
spring.profiles.active=${SPRING_PROFILES_ACTIVE:postgresql}

# JWT
# Set this as an environment variable in production never hardcode secrets
app.jwt.secret=${JWT_SECRET:your-256-bit-secret-key-change-this-in-production}
app.jwt.expiration=86400000

#OPENAI
# Set OPENAI_API_KEY as an environment variable
openai.api.key=${OPENAI_API_KEY:your-openai-key-here}
openai.api.url=https://api.openai.com/v1/chat/completions
openai.model=gpt-4o


#FILE UPLOAD
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/

#CORS
# React dev server runs on 5173 (Vite) or 3000 (CRA)
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
